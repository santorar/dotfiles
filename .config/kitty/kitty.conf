# BEGIN_KITTY_THEME
font_family      FantasqueSansMono Nerd Font
italic_font      auto
bold_font        auto
bold_italic_font auto

# Font size (in pts)
font_size        12.0

# disable closing confirm
confirm_os_window_close 0

# disable default window size
remember_window_size no

# Gruvbox Dark
include current-theme.conf
# END_KITTY_THEME
